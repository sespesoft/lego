server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: ${SCOPE_ORG_ID}
    timeout: 10s 
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels:
        - __meta_docker_container_name
        regex: '/(.*)'
        target_label: container
      - source_labels:
        - __meta_docker_service_name
        target_label: service_name
      - source_labels:
        - __meta_docker_container_label_com_docker_compose_service
        target_label: service_name
      - source_labels:
        - __meta_docker_container_label_service_role
        target_label: role
