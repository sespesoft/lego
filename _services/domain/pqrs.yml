services:
  pqrs:
    extends:
      file: ./environment/${ENV}.yml
      service: pqrs
    volumes:
      - pub_key:/rsa/pub:ro
      - pqrs_supervisor:/app/app/storage/supervisor.d
      - ./logs:/app/app/storage/logs
    environment:
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - AWS_BUCKET=${AWS_BUCKET}
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_KEY}
      - URL_DOCUMENT=http://audit/api/auth/
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    restart: unless-stopped
    profiles:
      - all
      - app
    labels:
      - traefik.enable=true
      - traefik.http.services.pqr.loadbalancer.server.port=80
      - traefik.http.routers.pqr.rule=Host(`pqrs.${DOMAIN}`)

  job_pqrs:
    extends:
      file: ./environment/${ENV}.yml
      service: job_pqrs
    environment:
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    volumes:
      - pqrs_supervisor:/app/app/storage/supervisor.d
    user: application
    profiles:
      - all
      - job
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        php app/ice dbup --schema=[!t]* --tag=pqrs
        php app/ice configure-rabbitmq
        php app/ice generate-supervisor
        supervisorctl -s http://pqrs:9001 -u root -p docker reread
        supervisorctl -s http://pqrs:9001 -u root -p docker update
    restart: on-failure
    labels:
      - service.rol=job
volumes:
  pqrs_supervisor:
