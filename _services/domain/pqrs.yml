services:
  pqrs:
    extends:
      file: ./environment/${ENV}.yml
      service: pqrs
    container_name: srv-pqrs
    volumes:
      - pub_key:/rsa/pub:ro
      - ./logs:/app/app/storage/logs
    environment:
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - AWS_BUCKET=${AWS_BUCKET}
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_KEY}
      - URL_DOCUMENT=http://audit/api/auth/
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.services.pqr.loadbalancer.server.port=80
      - traefik.http.routers.pqr.rule=Host(`pqrs.${DOMAIN}`)

  pqrs_conf:
    extends:
      file: ./environment/${ENV}.yml
      service: pqrs_conf
    container_name: conf-pqrs
    environment:
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    entrypoint: /bin/bash
    user: application
    command:
      - -c
      - |
        set -e
        php app/ice dbup --schema=[!t]* --tag=pqrs
        php app/ice configure-rabbitmq
        php app/ice generate-supervisor
    restart: on-failure
