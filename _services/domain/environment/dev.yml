x-config-srv: &config-srv
  restart: unless-stopped
x-config-job: &config-job
  restart: on-failure
  depends_on:
    db:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
services:
  webapp:
    build:
      context: ../../../webapp
      additional_contexts:
        - assets=../../../_assets
    labels:
      - traefik.http.routers.webapp.entrypoints=web
    <<: *config-srv
  audit:
    build:
      context: ../../../audit
    labels:
      - traefik.http.routers.audit.entrypoints=web
    <<: *config-srv
  audit_conf:
    build:
      context: ../../../audit
    <<: *config-job
  auth:
    build:
      context: ../../../auth
    labels:
      - traefik.http.routers.auth.entrypoints=web
    <<: *config-srv
  auth_conf:
    build:
      context: ../../../auth
    <<: *config-job
  geo:
    build:
      context: ../../../geo
    labels:
      - traefik.http.routers.geo.entrypoints=web
    <<: *config-srv
  geo_conf:
    build:
      context: ../../../geo
    <<: *config-job
  hiring:
    build:
      context: ../../../hiring
    labels:
      - traefik.http.routers.hiring.entrypoints=web
    <<: *config-srv
  hiring_conf:
    build:
      context: ../../../hiring
    <<: *config-job
  pgaudit:
    build:
      context: ../../../pgaudit-api
    labels:
      - traefik.http.routers.pga.entrypoints=web
    <<: *config-srv
  pgaudit_conf:
    build:
      context: ../../../pgaudit-api
    <<: *config-job
  pqrs:
    build:
      context: ../../../pqrs
    labels:
      - traefik.http.routers.pqr.entrypoints=web
    <<: *config-srv
  pqrs_conf:
    build:
      context: ../../../pqrs
    <<: *config-job
