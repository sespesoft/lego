services:
  hiring:
    extends:
      file: ./environment/${ENV}.yml
      service: hiring
    environment:
      - APP_URL=${PROTOCOL}://${DOMAIN}
      - APP_NAME=${APP_NAME}
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - AWS_BUCKET=${AWS_BUCKET}
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    restart: unless-stopped
    profiles:
      - all
      - app
    configs:
      - source: pub_key
        target: /rsa/pub/key.pem
    labels:
      - traefik.enable=true
      - traefik.http.services.hiring.loadbalancer.server.port=80
      - traefik.http.routers.hiring.rule=Host(`hiring.${DOMAIN}`)
      - service.role=app

  job_hiring:
    extends:
      file: ./environment/${ENV}.yml
      service: job_hiring
    environment:
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    user: application
    profiles:
      - all
      - job
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        php app/ice dbup --schema=[!t]* --tag=hiring
        php app/ice configure-rabbitmq
    restart: on-failure
    labels:
      - service.role=job
