services:
  hiring:
    extends:
      file: ./environment/${ENV}.yml
      service: hiring
    container_name: srv-hiring
    volumes:
      - pub_key:/rsa/pub:ro
      - hiring_supervisor:/app/app/storage/supervisor.d
      - ./logs:/app/app/storage/logs
    environment:
      - APP_URL=${PROTOCOL}://${DOMAIN}
      - APP_NAME=${APP_NAME}
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - AWS_BUCKET=${AWS_BUCKET}
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    restart: unless-stopped
    profiles:
      - all
      - app
    labels:
      - traefik.enable=true
      - traefik.http.services.hiring.loadbalancer.server.port=80
      - traefik.http.routers.hiring.rule=Host(`hiring.${DOMAIN}`)

  hiring_conf:
    extends:
      file: ./environment/${ENV}.yml
      service: hiring_conf
    container_name: conf-hiring
    environment:
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    volumes:
      - hiring_supervisor:/app/app/storage/supervisor.d
    user: application
    profiles:
      - job
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        php app/ice dbup --schema=[!t]* --tag=hiring
        php app/ice configure-rabbitmq
        php app/ice generate-supervisor
        supervisorctl -s http://hiring:9001 -u root -p docker reread
        supervisorctl -s http://hiring:9001 -u root -p docker update
    restart: on-failure
volumes:
  hiring_supervisor:
