services:
  notify:
    extends:
      file: ./environment/${ENV}.yml
      service: notify
    environment:
      APP_ENV: production
      FRONTEND_URL: ${PROTOCOL}://${DOMAIN}
      LOG_STACK: stderr
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_CLIENT: predis
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: ${REDIS_PORT}
      BROADCAST_CONNECTION: pusher
      PUSHER_APP_ID: ${SOKETI_ID}
      PUSHER_APP_KEY: ${SOKETI_KEY}
      PUSHER_APP_SECRET: ${SOKETI_SECRET}
      PUSHER_HOST: soketi
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http
      PUSHER_APP_CLUSTER: mt1
      MQ_USER: ${MQ_USER}
      MQ_PASSWORD: ${MQ_PASSWORD}
      MQ_HOST: ${MQ_HOST}
      MQ_PORT: ${MQ_PORT}
    profiles:
      - all
      - app
    configs:
      - source: pub_key
        target: /rsa/pub/key.pem
    labels:
      - traefik.enable=true
      - traefik.http.services.notify.loadbalancer.server.port=80
      - traefik.http.routers.notify.priority=10
      - traefik.http.routers.notify.rule=(Host(`notify.${DOMAIN}`) && PathPrefix(`/history`)) || (Host(`notify.${DOMAIN}`) && PathPrefix(`/auth`))
      - service.role=app
  soketi:
    extends:
      file: ./environment/${ENV}.yml
      service: soketi
    image: 'quay.io/soketi/soketi:latest-16-alpine'
    environment:
      SOKETI_ADAPTER_DRIVER: redis
      SOKETI_DB_REDIS_HOST: ${REDIS_HOST}
      SOKETI_DB_REDIS_PORT: ${REDIS_PORT}
      SOKETI_DB_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SOKETI_DEFAULT_APP_ID: ${SOKETI_ID}
      SOKETI_DEFAULT_APP_KEY: ${SOKETI_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${SOKETI_SECRET}
    profiles:
      - all
      - app
    labels:
        - traefik.enable=true
        - traefik.http.routers.soketi.rule=Host(`notify.${DOMAIN}`)
        - traefik.http.routers.soketi.priority=5
        - traefik.http.services.soketi.loadbalancer.server.port=6001
        - service.role=app
