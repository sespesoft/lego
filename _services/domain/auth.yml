services:
  auth:
    extends:
      file: ./environment/${ENV}.yml
      service: auth
    container_name: srv-auth
    volumes:
      - pub_key:/rsa/pub
      - priv_key:/rsa/priv
      - auth_supervisor:/app/app/storage/supervisor.d
      - ./logs:/app/app/storage/logs
    environment:
      - APP_URL=${PROTOCOL}://${DOMAIN}
      - APP_NAME=${APP_NAME}
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PRIVATEKEY=${PRIV_KEY}
      - PATH_PUBLICKEY=${PUB_KEY}
      - SMTP_HOST=${MAIL_HOST}
      - SMTP_PORT=${MAIL_PORT}
      - SMTP_AUTH=true
      - SMTP_USER=${MAIL_USER}
      - SMTP_PASSWORD=${MAIL_PASSWORD}
      - AWS_BUCKET=${AWS_BUCKET}
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_KEY}
      - RECAPTCHA_PULICKEY=${RECAPTCHA_PUB}
      - RECAPTCHA_PRIVATEKEY=${RECAPTCHA_PRIV}
      - ENABLE_REGISTER=${ENABLE_REGISTER}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.services.auth.loadbalancer.server.port=80
      - traefik.http.routers.auth.rule=Host(`auth.${DOMAIN}`)

  auth_conf:
    extends:
      file: ./environment/${ENV}.yml
      service: auth_conf
    container_name: conf-auth
    environment:
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    volumes:
      - auth_supervisor:/app/app/storage/supervisor.d
    user: application
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        php app/ice dbup --schema="{perfiles,[!t]*}" --tag=auth
        php app/ice configure-rabbitmq
    restart: on-failure
volumes:
  pub_key:
  priv_key:
  auth_supervisor:
