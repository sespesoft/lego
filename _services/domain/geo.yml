services:
  geo:
    extends:
      file: ./environment/${ENV}.yml
      service: geo
    environment:
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    restart: unless-stopped
    profiles:
      - all
      - app
    configs:
      - source: pub_key
        target: /rsa/pub/key.pem
    labels:
      - traefik.enable=true
      - traefik.http.services.geo.loadbalancer.server.port=80
      - traefik.http.routers.geo.rule=Host(`geo.${DOMAIN}`)
      - service.role=app

  job_geo:
    extends:
      file: ./environment/${ENV}.yml
      service: job_geo
    environment:
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    profiles:
      - all
      - job
    entrypoint: /bin/bash
    user: application
    command:
      - -c 
      - |
        set -e
        php app/ice dbup --schema=[!t]* --tag=geo
        php app/ice configure-rabbitmq
    restart: on-failure
    labels:
      - service.role=job
