services:
  geo:
    extends:
      file: ./environment/${ENV}.yml
      service: geo
    volumes:
      - pub_key:/rsa/pub:ro
      - geo_supervisor:/app/app/storage/supervisor.d
      - ./logs:/app/app/storage/logs
    environment:
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    restart: unless-stopped
    profiles:
      - all
      - app
    labels:
      - traefik.enable=true
      - traefik.http.services.geo.loadbalancer.server.port=80
      - traefik.http.routers.geo.rule=Host(`geo.${DOMAIN}`)

  job_geo:
    extends:
      file: ./environment/${ENV}.yml
      service: job_geo
    environment:
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    volumes:
      - geo_supervisor:/app/app/storage/supervisor.d
    profiles:
      - all
      - job
    entrypoint: /bin/bash
    user: application
    command:
      - -c 
      - |
        set -e
        php app/ice dbup --schema=[!t]* --tag=geo
        php app/ice configure-rabbitmq
        php app/ice generate-supervisor
        supervisorctl -s http://geo:9001 -u root -p docker reread
        supervisorctl -s http://geo:9001 -u root -p docker update
    restart: on-failure
    labels:
      - service.rol=job
volumes:
  geo_supervisor:
