services:
  pgaudit:
    extends:
      file: ./environment/${ENV}.yml
      service: pgaudit
    volumes:
      - pub_key:/rsa/pub:ro
      - pgaudit_supervisor:/app/app/storage/supervisor.d
      - ./logs:/app/app/storage/logs
    environment:
      - APP_URL=${PROTOCOL}://${DOMAIN}
      - APP_NAME=${APP_NAME}
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    restart: unless-stopped
    profiles:
      - all
      - app
    labels:
      - traefik.enable=true
      - traefik.http.services.pga.loadbalancer.server.port=80
      - traefik.http.routers.pga.rule=Host(`pgaudit.${DOMAIN}`)

  job_pgaudit:
    extends:
      file: ./environment/${ENV}.yml
      service: job_pgaudit
    environment:
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    volumes:
      - pgaudit_supervisor:/app/app/storage/supervisor.d
    user: application
    profiles:
      - all
      - job
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        php app/ice dbup --schema=[!t]* --tag=pgaudit
        php app/ice configure-rabbitmq
        php app/ice generate-supervisor
        supervisorctl -s http://pgaudit:9001 -u root -p docker reread
        supervisorctl -s http://pgaudit:9001 -u root -p docker update
    restart: on-failure
    labels:
      - service.rol=job
volumes:
  pgaudit_supervisor:
