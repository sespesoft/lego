services:
  pgaudit:
    extends:
      file: ./environment/${ENV}.yml
      service: pgaudit
    container_name: srv-pgaudit
    volumes:
      - pub_key:/rsa/pub:ro
      - ./logs:/app/app/storage/logs
    environment:
      - APP_URL=${PROTOCOL}://${DOMAIN}
      - APP_NAME=${APP_NAME}
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.services.pga.loadbalancer.server.port=80
      - traefik.http.routers.pga.rule=Host(`pgaudit.${DOMAIN}`)

  pgaudit_conf:
    extends:
      file: ./environment/${ENV}.yml
      service: pgaudit_conf
    container_name: conf-pgaudit
    environment:
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    entrypoint: /bin/bash
    user: application
    command:
      - -c
      - |
        set -e
        php app/ice dbup --schema=[!t]* --tag=pgaudit
        php app/ice configure-rabbitmq
        php app/ice generate-supervisor
    restart: on-failure
