services:
  pgaudit:
    extends:
      file: ./environment/${ENV}.yml
      service: pgaudit
    environment:
      - APP_URL=${PROTOCOL}://${DOMAIN}
      - APP_NAME=${APP_NAME}
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    restart: unless-stopped
    profiles:
      - all
      - app
    configs:
      - source: pub_key
        target: /rsa/pub/key.pem
    labels:
      - traefik.enable=true
      - traefik.http.services.pga.loadbalancer.server.port=80
      - traefik.http.routers.pga.rule=Host(`pgaudit.${DOMAIN}`)
      - service.role=app

  job_pgaudit:
    extends:
      file: ./environment/${ENV}.yml
      service: job_pgaudit
    environment:
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PATH_PUBLICKEY=${PUB_KEY}
      - MQ_USER=${MQ_USER}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_HOST=${MQ_HOST}
      - MQ_PORT=${MQ_PORT}
    user: application
    profiles:
      - all
      - job
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        php app/ice dbup --schema=[!t]* --tag=pgaudit
        php app/ice configure-rabbitmq
    restart: on-failure
    labels:
      - service.role=job
