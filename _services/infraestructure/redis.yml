services:
  redis:
    image: 'redis:8.0.3'
    container_name: infra-redis
    volumes:
      - ../../_configs/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-data:/data
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
      - --requirepass
      - ${REDIS_PASSWORD}
      - --port
      - ${REDIS_PORT}
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - all
      - infra
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: 
          - node.role == manager
volumes:
  redis-data:
