include:
  - ../infraestructure/loki.yml
  - ../infraestructure/promtail.yml
services:
  grafana:
    extends:
      file: ./environment/${ENV}.yml
      service: grafana
    image: grafana/grafana:12.1.0
    environment:
      GF_SERVER_DOMAIN: grafana.${DOMAIN}
      GF_SERVER_ROOT_URL: ${PROTOCOL}://grafana.${DOMAIN}
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: ${GF_DB_HOST}
      GF_DATABASE_NAME: ${GF_DB_NAME}
      GF_DATABASE_USER: ${GF_DB_USER}
      GF_DATABASE_PASSWORD: ${GF_DB_PASSWORD}
      GF_DATABASE_SSL_MODE: 'disable'
      SCOPE_ORG_ID: ${ENV}
    container_name: app-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../_configs/grafana-provision.yml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
    profiles:
      - all
      - app
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)
      - traefik.http.services.grafana.loadbalancer.server.port=3000
      - traefik.http.routers.grafana.middlewares=grafana-cors
      - traefik.http.middlewares.grafana-cors.headers.accesscontrolallowmethods=GET,OPTIONS,PUT,POST
      - traefik.http.middlewares.grafana-cors.headers.accesscontrolalloworiginlist=${PROTOCOL}://${DOMAIN}
      - traefik.http.middlewares.grafana-cors.headers.accesscontrolmaxage=100
      - traefik.http.middlewares.grafana-cors.headers.addvaryheader=true
      - traefik.http.middlewares.grafana-cors.headers.accesscontrolallowcredentials=true
volumes:
  grafana_data:
